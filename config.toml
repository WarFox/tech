baseURL = "http://deepumohan.com/"
languageCode = "en-uk"
title = "deepu mohan puthrote"
theme= "ananke"

DefaultContentLanguage = "en"
SectionPagesMenu = "main"
Paginate = 10
googleAnalytics = ""
enableRobotsTXT = true

enableEmoji = true
enableGitInfo = true

disqusShortname = "warfox"

[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  favicon = ""
  description = "Deepu Mohan Puthrote"
  facebook = "https://fb.com/deepu.mohan.p/"
  twitter = "https://twitter.com/deepumohanp/"
  instagram = "https://instagram.com/deepu.mohan.p/"
  youtube = "https://www.youtube.com/channel/UC1kfyS5UwNM9bU8K3k1PqyQ"
  github = "https://github.com/WarFox/"
  gitlab = "https://gitlab.com/WarFox/"
  linkedin = "https://linkedin.com/in/deepumohanp/"
  show_reading_time = true
  # choose a background color from any on this page: http://tachyons.io/docs/themes/skins/ and preface it with "bg-"
  background_color_class = "bg-near-black"
  # featured_image = "/images/gohugo-default-sample-hero-image.jpg"
  recent_posts_number = 5

[taxonomies]
  category = "categories"
  tag = "tags"

[permalinks]
  tech  = ":section/:title"
  drafts  = ":section/:title"

[markup]
  [markup.highlight]
    codeFences = true
    hl_Lines = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    style = "monokai"
    tabWidth = 4